    <script>
      function toggle() {
        let search = document.getElementById("search");
        let icon = document.getElementById("icon");
        if (search.value.trim() !== "") {
          icon.style.display = "none";
        } else {
          icon.style.display = "block";
        }
      }
      let search = document.getElementById("search");
      let table = document.getElementById("table");
      let data = document.getElementsByTagName("tr");
      let text = document.getElementById("text");
      search.addEventListener("input", function () {
        let value = search.value.toLowerCase();

        for (let i = 1; i < data.length; i++) {
          let tableData = data[i].textContent.toLowerCase(); // data[i] shows convert one by one!
          if (tableData.includes(value)) {
            data[i].style.display = ""; // also display one by one to avoid from mess up!
          } else {
            data[i].style.display = "none";
          }
        }
      });
